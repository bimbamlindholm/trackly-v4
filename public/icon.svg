<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0E294B" />
      <stop offset="100%" stop-color="#07111F" />
    </radialGradient>
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="neonViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="glowEffect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGlow)" stroke="#06b6d4" stroke-width="6" stroke-opacity="0.15" />

  <!-- Outer Ring (Clock frame) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#neonCyan)" stroke-width="12" stroke-dasharray="10 15" stroke-opacity="0.4" />
  
  <!-- Solid Accent Arc -->
  <path d="M 256,76 A 180,180 0 0,1 436,256" fill="none" stroke="url(#neonViolet)" stroke-width="14" stroke-linecap="round" filter="url(#glowEffect)" />

  <!-- Inner Fingerprint Clock Design -->
  <g filter="url(#glowEffect)" stroke-linecap="round" fill="none">
    <!-- Fingerprint Ridge 1 (Outer) -->
    <path d="M 180,310 A 100,100 0 0,1 332,310" stroke="url(#neonCyan)" stroke-width="12" />
    
    <!-- Fingerprint Ridge 2 -->
    <path d="M 150,256 A 110,110 0 0,1 362,256" stroke="url(#neonCyan)" stroke-width="8" stroke-opacity="0.7" />

    <!-- Fingerprint Ridge 3 (Inner Clock Loop) -->
    <path d="M 210,256 A 46,46 0 1,1 302,256 L 302,320" stroke="url(#neonViolet)" stroke-width="14" />
    
    <!-- Center Core -->
    <path d="M 240,256 A 16,16 0 0,1 272,256" stroke="url(#neonCyan)" stroke-width="14" />
  </g>

  <!-- Clock Hands (Representing DTR / Time Tracking) -->
  <line x1="256" y1="256" x2="256" y2="150" stroke="#ffffff" stroke-width="10" stroke-linecap="round" filter="url(#glowEffect)" />
  <line x1="256" y1="256" x2="320" y2="256" stroke="url(#neonCyan)" stroke-width="8" stroke-linecap="round" />

  <!-- Glowing Center Node -->
  <circle cx="256" cy="256" r="16" fill="#ffffff" filter="url(#glowEffect)" />
  <circle cx="256" cy="256" r="8" fill="#06b6d4" />
</svg>
